name = "leave-management-app"
main = "src/worker.js"
compatibility_date = "2026-07-13"

[[d1_databases]]
binding = "DB"
database_name = "leave-management-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "leave-management-attachments"

[vars]
APP_NAME = "LeaveDesk"
